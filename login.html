<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — YoFly Crew</title>
  <meta name="description" content="Sign in to your YoFly Crew account and access the crew community." />
  <link rel="icon" href="logo_cropped.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000;">

  <!-- ============ CURSOR ============ -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <!-- ============ BACKGROUND ============ -->
  <div class="hero-grid" style="opacity: 0.3;"></div>
  <div class="orb orb-1" style="opacity: 0.1;"></div>
  <canvas class="particles-canvas" id="particlesCanvas"></canvas>

  <!-- ============ LOGIN CARD ============ -->
  <main class="reveal-up" style="width: 90%; max-width: 450px; z-index: 10;">
    <div style="text-align: center; margin-bottom: 40px;">
      <a href="index.html">
        <img src="logo_cropped.png" alt="YoFly Crew" style="height: 60px; margin: 0 auto 30px;" />
      </a>
    </div>

    <div class="content-card" style="padding: 50px; border-radius: 32px; background: rgba(14, 14, 14, 0.8); border: 1px solid var(--border); box-shadow: 0 40px 80px rgba(0,0,0,0.5);">
      <div class="section-badge" style="margin-bottom: 10px;">Sign In</div>
      <h1 style="font-size: 2em; margin-bottom: 10px;">Welcome <span class="gradient-text">Crew</span></h1>
      <p style="margin-bottom: 35px; opacity: 0.6; font-size: 0.95em;">Enter your email to receive a secure Magic Link.</p>

      <form id="loginForm" style="display: grid; gap: 20px;">
        <div>
          <label for="loginEmail" style="display: block; margin-bottom: 10px; font-size: 0.85em; opacity: 0.7; font-weight: 500;">Work or Personal Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required 
                 style="width: 100%; padding: 18px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: white; font-family: inherit; font-size: 1em;" />
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 18px; margin-top: 10px;">
          Send Magic Link
        </button>
      </form>

      <div id="loginMessage" style="margin-top: 25px; text-align: center; font-size: 0.9em; min-height: 24px;"></div>

      <div style="margin-top: 35px; padding-top: 30px; border-top: 1px solid var(--border); text-align: center;">
        <p style="font-size: 0.85em; opacity: 0.5;">Not crew? <a href="about.html" class="gradient-text" style="font-weight: 600;">Learn More</a></p>
      </div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
      <a href="index.html" style="font-size: 0.9em; opacity: 0.5; transition: 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">
        &larr; Back to Home
      </a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
