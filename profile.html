<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — YoFly Crew</title>
  <meta name="description" content="Manage your YoFly Crew profile and professional status." />
  <link rel="icon" href="logo_cropped.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ============ CURSOR ============ -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <!-- ============ NAV ============ -->
  <nav class="nav scrolled" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="logo_cropped.png" alt="YoFly Crew" class="nav-logo-img" />
      </a>
      <ul class="nav-links">
        <li><a href="features.html">Features</a></li>
        <li><a href="community.html">Community</a></li>
        <li><a href="marketplace.html">Marketplace</a></li>
        <li><a href="alerts.html">Alerts</a></li>
      </ul>
      <div class="nav-cta" id="navAuth">
        <button class="btn btn-ghost" id="signOutBtn">Sign Out</button>
      </div>
    </div>
  </nav>

  <!-- ============ SUBPAGE HERO ============ -->
  <section class="subpage-hero">
    <div class="hero-grid"></div>
    <div class="orb orb-1"></div>
    <canvas class="particles-canvas" id="particlesCanvas"></canvas>

    <div class="reveal-up">
      <div class="section-badge">Member Profile</div>
      <h1 class="hero-title">Welcome <span class="gradient-text">Crewmember</span></h1>
      <p class="hero-subtitle">Complete your profile to unlock exclusive community features.</p>
    </div>
  </section>

  <!-- ============ PROFILE CONTENT ============ -->
  <main class="page-content">
    <div class="reveal-up">
      <div class="content-card" style="max-width: 800px; margin: 0 auto; padding: 50px;">
        <div style="text-align: center; margin-bottom: 40px;">
          <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--grad-primary); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px;">✈️</div>
          <h2 id="profileEmail">...</h2>
          <div class="section-badge" style="margin-top: 10px; background: rgba(255, 255, 255, 0.05);">Pending Verification</div>
        </div>

        <form id="profileForm" style="display: grid; gap: 20px;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
              <label style="display: block; margin-bottom: 10px; font-size: 0.9em; opacity: 0.7;">Full Name</label>
              <input type="text" placeholder="John Doe" style="width: 100%; padding: 15px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--border); color: white;" />
            </div>
            <div>
              <label style="display: block; margin-bottom: 10px; font-size: 0.9em; opacity: 0.7;">Airline / Company</label>
              <input type="text" placeholder="e.g. Delta, Emirates" style="width: 100%; padding: 15px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--border); color: white;" />
            </div>
          </div>
          
          <div>
            <label style="display: block; margin-bottom: 10px; font-size: 0.9em; opacity: 0.7;">Primary Role</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <label class="content-card" style="cursor: pointer; padding: 20px; text-align: center; border: 1px solid var(--border);">
                <input type="radio" name="role" value="pilot" style="display: none;" />
                <div style="font-size: 24px; margin-bottom: 10px;">👨‍✈️</div>
                <div>Pilot</div>
              </label>
              <label class="content-card" style="cursor: pointer; padding: 20px; text-align: center; border: 1px solid var(--border);">
                <input type="radio" name="role" value="fa" style="display: none;" />
                <div style="font-size: 24px; margin-bottom: 10px;">💃</div>
                <div>Flight Attendant</div>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 20px; padding: 18px;">Save Profile</button>
          <a href="verify.html" class="btn btn-ghost" style="width: 100%; justify-content: center;">Get Verified Now</a>
        </form>
      </div>
    </div>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="footer">
    <div class="footer-bottom">
      <span>© 2026 YoFly Crew. All rights reserved.</span>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    // Profile-specific logic
    document.addEventListener('DOMContentLoaded', async () => {
      if (!supabase) return;
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      document.getElementById('profileEmail').textContent = user.email;
      
      document.getElementById('signOutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
